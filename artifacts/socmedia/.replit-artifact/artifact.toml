kind = "web"
previewPath = "/"
title = "SocMedia Ops"
version = "1.0.0"
id = "artifacts/socmedia"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25882

[services.development]
run = "pnpm --filter @workspace/socmedia run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/socmedia", "run", "build" ]
publicDir = "artifacts/socmedia/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25882"
BASE_PATH = "/"
